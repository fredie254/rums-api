<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMS API — Swagger UI</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
  body { margin: 0; background: #fafafa; }
  .swagger-ui .topbar { background: #1a1d27; }
  .swagger-ui .topbar .download-url-wrapper { display: none; }
  .swagger-ui .info .title { color: #1a1d27; }
</style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
const spec = {
  "openapi": "3.0.3",
  "info": {
    "title": "RUMS API",
    "description": "Rental Unit Management System — standalone REST API.\n\nAll responses follow the envelope: `{ success, data?, meta?, message?, errors?, _ms }`\n\n**Authentication:** All protected endpoints require `Authorization: Bearer <token>`. GET endpoints also accept `?api_token=<token>`.",
    "version": "1.0.0",
    "contact": { "name": "Ultimate Solutions", "url": "https://ultimatesolutions.co.ke" }
  },
  "servers": [
    { "url": "https://api.rums.ultimatesolutions.co.ke/api/v1", "description": "Production" }
  ],
  "components": {
    "securitySchemes": {
      "BearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "hex" }
    },
    "schemas": {
      "Success": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean", "example": true },
          "data":    { "type": "object" },
          "message": { "type": "string" },
          "_ms":     { "type": "number", "example": 12.4 }
        }
      },
      "Paginated": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean", "example": true },
          "data":    { "type": "array", "items": {} },
          "meta": {
            "type": "object",
            "properties": {
              "total":        { "type": "integer" },
              "per_page":     { "type": "integer" },
              "current_page": { "type": "integer" },
              "total_pages":  { "type": "integer" }
            }
          },
          "_ms": { "type": "number" }
        }
      },
      "Error": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean", "example": false },
          "message": { "type": "string" },
          "errors":  { "type": "array", "items": { "type": "string" } },
          "_ms":     { "type": "number" }
        }
      },
      "User": {
        "type": "object",
        "properties": {
          "id":         { "type": "integer" },
          "name":       { "type": "string" },
          "email":      { "type": "string", "format": "email" },
          "phone":      { "type": "string", "nullable": true },
          "role":       { "type": "string", "enum": ["admin","manager","landlord","tenant","accountant","maintenance","auditor","security"] },
          "status":     { "type": "string", "enum": ["active","inactive","suspended"] },
          "last_login": { "type": "string", "format": "date-time", "nullable": true },
          "created_at": { "type": "string", "format": "date-time" }
        }
      },
      "Property": {
        "type": "object",
        "properties": {
          "id":              { "type": "integer" },
          "name":            { "type": "string" },
          "property_type":   { "type": "string" },
          "address_line1":   { "type": "string", "nullable": true },
          "address_city":    { "type": "string", "nullable": true },
          "address_county":  { "type": "string" },
          "address_country": { "type": "string", "default": "Kenya" },
          "total_units":     { "type": "integer" },
          "landlord_id":     { "type": "integer", "nullable": true },
          "manager_id":      { "type": "integer", "nullable": true },
          "status":          { "type": "string", "enum": ["active","inactive","deleted"] },
          "created_at":      { "type": "string", "format": "date-time" }
        }
      },
      "Unit": {
        "type": "object",
        "properties": {
          "id":             { "type": "integer" },
          "property_id":    { "type": "integer" },
          "unit_number":    { "type": "string" },
          "unit_type":      { "type": "string" },
          "floor":          { "type": "integer", "nullable": true },
          "bedrooms":       { "type": "integer", "nullable": true },
          "bathrooms":      { "type": "integer", "nullable": true },
          "size_sqft":      { "type": "number", "nullable": true },
          "rent_amount":    { "type": "number" },
          "deposit_amount": { "type": "number" },
          "furnished":      { "type": "boolean" },
          "status":         { "type": "string", "enum": ["available","occupied","maintenance","inactive"] },
          "created_at":     { "type": "string", "format": "date-time" }
        }
      },
      "Tenant": {
        "type": "object",
        "properties": {
          "id":         { "type": "integer" },
          "first_name": { "type": "string" },
          "last_name":  { "type": "string" },
          "email":      { "type": "string", "format": "email" },
          "phone":      { "type": "string" },
          "id_number":  { "type": "string" },
          "id_type":    { "type": "string", "default": "national_id" },
          "gender":     { "type": "string", "enum": ["male","female","other"], "nullable": true },
          "occupation": { "type": "string", "nullable": true },
          "status":     { "type": "string", "enum": ["active","inactive","blacklisted"] },
          "created_at": { "type": "string", "format": "date-time" }
        }
      },
      "Lease": {
        "type": "object",
        "properties": {
          "id":            { "type": "integer" },
          "lease_number":  { "type": "string" },
          "unit_id":       { "type": "integer" },
          "tenant_id":     { "type": "integer" },
          "start_date":    { "type": "string", "format": "date" },
          "end_date":      { "type": "string", "format": "date" },
          "monthly_rent":  { "type": "number" },
          "deposit_amount":{ "type": "number" },
          "payment_day":   { "type": "integer" },
          "status":        { "type": "string", "enum": ["active","expired","terminated"] },
          "created_at":    { "type": "string", "format": "date-time" }
        }
      },
      "Invoice": {
        "type": "object",
        "properties": {
          "id":              { "type": "integer" },
          "invoice_number":  { "type": "string" },
          "lease_id":        { "type": "integer" },
          "tenant_id":       { "type": "integer" },
          "invoice_date":    { "type": "string", "format": "date" },
          "due_date":        { "type": "string", "format": "date" },
          "rent_amount":     { "type": "number" },
          "utility_amount":  { "type": "number" },
          "penalty_amount":  { "type": "number" },
          "discount_amount": { "type": "number" },
          "total_amount":    { "type": "number" },
          "amount_paid":     { "type": "number" },
          "status":          { "type": "string", "enum": ["unpaid","partial","paid","overdue","cancelled"] },
          "created_at":      { "type": "string", "format": "date-time" }
        }
      },
      "Payment": {
        "type": "object",
        "properties": {
          "id":                   { "type": "integer" },
          "payment_ref":          { "type": "string" },
          "lease_id":             { "type": "integer" },
          "invoice_id":           { "type": "integer", "nullable": true },
          "tenant_id":            { "type": "integer" },
          "amount":               { "type": "number" },
          "payment_date":         { "type": "string", "format": "date" },
          "payment_method":       { "type": "string", "enum": ["cash","mpesa","bank","cheque","other"] },
          "payment_type":         { "type": "string", "default": "rent" },
          "mpesa_transaction_id": { "type": "string", "nullable": true },
          "status":               { "type": "string", "enum": ["completed","pending","reversed"] },
          "created_at":           { "type": "string", "format": "date-time" }
        }
      },
      "MaintenanceRequest": {
        "type": "object",
        "properties": {
          "id":             { "type": "integer" },
          "request_number": { "type": "string" },
          "unit_id":        { "type": "integer" },
          "tenant_id":      { "type": "integer", "nullable": true },
          "issue_title":    { "type": "string" },
          "description":    { "type": "string", "nullable": true },
          "priority":       { "type": "string", "enum": ["low","medium","high","urgent"] },
          "category":       { "type": "string", "nullable": true },
          "status":         { "type": "string", "enum": ["open","in_progress","completed","resolved","cancelled"] },
          "assigned_to":    { "type": "integer", "nullable": true },
          "materials_cost": { "type": "number", "nullable": true },
          "labour_cost":    { "type": "number", "nullable": true },
          "created_at":     { "type": "string", "format": "date-time" }
        }
      }
    },
    "parameters": {
      "id":       { "name": "id", "in": "path", "required": true, "schema": { "type": "integer" } },
      "page":     { "name": "page",     "in": "query", "schema": { "type": "integer", "default": 1 } },
      "per_page": { "name": "per_page", "in": "query", "schema": { "type": "integer", "default": 20, "maximum": 200 } }
    },
    "responses": {
      "401": { "description": "Unauthorized — missing or invalid Bearer token" },
      "403": { "description": "Forbidden — insufficient role or scope" },
      "404": { "description": "Not found" },
      "422": { "description": "Validation error" }
    }
  },
  "security": [{ "BearerAuth": [] }],
  "tags": [
    { "name": "Auth",        "description": "Authentication & token management" },
    { "name": "Properties",  "description": "Property management" },
    { "name": "Units",       "description": "Unit management" },
    { "name": "Tenants",     "description": "Tenant management" },
    { "name": "Leases",      "description": "Lease management" },
    { "name": "Payments",    "description": "Payment recording" },
    { "name": "Invoices",    "description": "Invoice management" },
    { "name": "Maintenance", "description": "Maintenance work orders" },
    { "name": "Reports",     "description": "Analytics & reports" },
    { "name": "Users",       "description": "User & token administration (admin only)" },
    { "name": "System",      "description": "Health & system info" }
  ],
  "paths": {

    "/health": {
      "get": {
        "tags": ["System"], "summary": "Health check", "security": [],
        "responses": {
          "200": { "description": "System healthy",
            "content": { "application/json": { "example": { "success": true, "data": { "status": "ok", "version": "1.0.0", "services": { "database": "up" } } } } } }
        }
      }
    },

    "/auth/login": {
      "post": {
        "tags": ["Auth"], "summary": "Login — exchange credentials for a token", "security": [],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["email","password"],
            "properties": {
              "email":    { "type": "string", "format": "email", "example": "admin@rums.co.ke" },
              "password": { "type": "string", "example": "Admin@2024!" }
            }
          }}}
        },
        "responses": {
          "200": { "description": "Login successful", "content": { "application/json": { "example": {
            "success": true, "data": {
              "token": "a3f9c2d8...", "token_type": "Bearer", "expires_in": 31536000,
              "user": { "id": 1, "name": "System Admin", "email": "admin@rums.co.ke", "role": "admin" }
            }, "message": "Login successful."
          }}}},
          "401": { "description": "Invalid credentials" }
        }
      }
    },

    "/auth/logout": {
      "post": {
        "tags": ["Auth"], "summary": "Logout — revoke current token",
        "responses": {
          "200": { "description": "Logged out", "content": { "application/json": { "example": { "success": true, "message": "Logged out." } } } }
        }
      }
    },

    "/auth/me": {
      "get": {
        "tags": ["Auth"], "summary": "Current user profile and token info",
        "responses": {
          "200": { "description": "Profile data" },
          "401": { "$ref": "#/components/responses/401" }
        }
      }
    },

    "/auth/token": {
      "post": {
        "tags": ["Auth"], "summary": "Issue a named API token",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["scopes"],
            "properties": {
              "name":         { "type": "string", "example": "Mobile App Token" },
              "scopes":       { "type": "string", "example": "read:properties,write:payments" },
              "expires_days": { "type": "integer", "example": 365, "description": "0 = never expires" }
            }
          }}}
        },
        "responses": {
          "201": { "description": "Token issued" },
          "401": { "$ref": "#/components/responses/401" }
        }
      }
    },

    "/auth/token/{id}": {
      "delete": {
        "tags": ["Auth"], "summary": "Revoke a token by ID",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": {
          "200": { "description": "Token revoked" },
          "403": { "description": "Can only revoke own tokens unless admin" }
        }
      }
    },

    "/properties": {
      "get": {
        "tags": ["Properties"], "summary": "List properties",
        "parameters": [
          { "name": "search",      "in": "query", "schema": { "type": "string" } },
          { "name": "status",      "in": "query", "schema": { "type": "string", "enum": ["active","inactive"] } },
          { "name": "landlord_id", "in": "query", "schema": { "type": "integer" } },
          { "$ref": "#/components/parameters/page" },
          { "$ref": "#/components/parameters/per_page" }
        ],
        "responses": { "200": { "description": "Paginated property list" } }
      },
      "post": {
        "tags": ["Properties"], "summary": "Create a property",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["name","property_type","address_county"],
            "properties": {
              "name":            { "type": "string", "example": "Sunset Apartments" },
              "property_type":   { "type": "string", "example": "apartment" },
              "address_county":  { "type": "string", "example": "Nairobi" },
              "address_line1":   { "type": "string" },
              "address_city":    { "type": "string", "example": "Westlands" },
              "address_country": { "type": "string", "default": "Kenya" },
              "total_units":     { "type": "integer", "example": 24 },
              "year_built":      { "type": "integer", "example": 2018 },
              "landlord_id":     { "type": "integer" },
              "manager_id":      { "type": "integer" },
              "description":     { "type": "string" },
              "amenities":       { "type": "string" }
            }
          }}}
        },
        "responses": {
          "201": { "description": "Property created", "content": { "application/json": { "example": { "success": true, "data": { "id": 1 }, "message": "Property created." } } } },
          "422": { "$ref": "#/components/responses/422" }
        }
      }
    },

    "/properties/{id}": {
      "get": {
        "tags": ["Properties"], "summary": "Get property with units and stats",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Property detail" }, "404": { "$ref": "#/components/responses/404" } }
      },
      "put": {
        "tags": ["Properties"], "summary": "Full update of a property",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": { "required": true, "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Property" } } } },
        "responses": { "200": { "description": "Updated" }, "404": { "$ref": "#/components/responses/404" } }
      },
      "patch": {
        "tags": ["Properties"], "summary": "Partial update of a property",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": { "required": true, "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Property" } } } },
        "responses": { "200": { "description": "Updated" }, "404": { "$ref": "#/components/responses/404" } }
      },
      "delete": {
        "tags": ["Properties"], "summary": "Soft-delete a property (fails if units occupied)",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Deleted" }, "409": { "description": "Has occupied units" } }
      }
    },

    "/properties/{id}/units": {
      "get": {
        "tags": ["Properties"], "summary": "All units for a property with current tenant",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Unit list" } }
      }
    },

    "/properties/{id}/stats": {
      "get": {
        "tags": ["Properties"], "summary": "Occupancy and income stats",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Stats", "content": { "application/json": { "example": {
          "success": true, "data": { "total_units": 12, "occupied": 10, "available": 2, "maintenance": 0, "potential_monthly_revenue": 120000, "year_income": 980000 }
        }}}}}
      }
    },

    "/units": {
      "get": {
        "tags": ["Units"], "summary": "List units",
        "parameters": [
          { "name": "property_id", "in": "query", "schema": { "type": "integer" } },
          { "name": "status",      "in": "query", "schema": { "type": "string", "enum": ["available","occupied","maintenance","inactive"] } },
          { "name": "type",        "in": "query", "schema": { "type": "string" } },
          { "$ref": "#/components/parameters/page" },
          { "$ref": "#/components/parameters/per_page" }
        ],
        "responses": { "200": { "description": "Paginated unit list" } }
      },
      "post": {
        "tags": ["Units"], "summary": "Create a unit",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["property_id","unit_number","unit_type","rent_amount"],
            "properties": {
              "property_id":    { "type": "integer", "example": 1 },
              "unit_number":    { "type": "string",  "example": "A1" },
              "unit_type":      { "type": "string",  "example": "1br" },
              "rent_amount":    { "type": "number",  "example": 15000 },
              "deposit_amount": { "type": "number",  "example": 30000 },
              "bedrooms":       { "type": "integer", "example": 1 },
              "bathrooms":      { "type": "integer", "example": 1 },
              "floor":          { "type": "integer", "example": 2 },
              "size_sqft":      { "type": "number",  "example": 450 },
              "furnished":      { "type": "boolean", "example": false },
              "amenities":      { "type": "string" }
            }
          }}}
        },
        "responses": { "201": { "description": "Unit created" }, "409": { "description": "Unit number already exists in property" } }
      }
    },

    "/units/{id}": {
      "get": {
        "tags": ["Units"], "summary": "Unit detail with current tenant and recent payments",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Unit detail" }, "404": { "$ref": "#/components/responses/404" } }
      },
      "put": {
        "tags": ["Units"], "summary": "Full update of a unit",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": { "required": true, "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Unit" } } } },
        "responses": { "200": { "description": "Updated" } }
      },
      "patch": {
        "tags": ["Units"], "summary": "Partial update of a unit",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": { "required": true, "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Unit" } } } },
        "responses": { "200": { "description": "Updated" } }
      }
    },

    "/units/{id}/status": {
      "patch": {
        "tags": ["Units"], "summary": "Change unit status",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["status"],
            "properties": { "status": { "type": "string", "enum": ["available","occupied","maintenance","inactive"] } }
          }}}
        },
        "responses": { "200": { "description": "Status updated" } }
      }
    },

    "/tenants": {
      "get": {
        "tags": ["Tenants"], "summary": "List tenants",
        "parameters": [
          { "name": "search",      "in": "query", "schema": { "type": "string" }, "description": "Name, email, or phone" },
          { "name": "status",      "in": "query", "schema": { "type": "string", "enum": ["active","inactive","blacklisted"] } },
          { "name": "property_id", "in": "query", "schema": { "type": "integer" } },
          { "$ref": "#/components/parameters/page" },
          { "$ref": "#/components/parameters/per_page" }
        ],
        "responses": { "200": { "description": "Paginated tenant list" } }
      },
      "post": {
        "tags": ["Tenants"], "summary": "Create a tenant",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["first_name","last_name","email","phone","id_number"],
            "properties": {
              "first_name":              { "type": "string", "example": "John" },
              "last_name":               { "type": "string", "example": "Doe" },
              "email":                   { "type": "string", "format": "email", "example": "john.doe@email.com" },
              "phone":                   { "type": "string", "example": "+254700000000" },
              "id_number":               { "type": "string", "example": "12345678" },
              "id_type":                 { "type": "string", "default": "national_id" },
              "dob":                     { "type": "string", "format": "date" },
              "gender":                  { "type": "string", "enum": ["male","female","other"] },
              "occupation":              { "type": "string" },
              "employer":                { "type": "string" },
              "monthly_income":          { "type": "number", "example": 80000 },
              "emergency_contact_name":  { "type": "string" },
              "emergency_contact_phone": { "type": "string" }
            }
          }}}
        },
        "responses": { "201": { "description": "Tenant created" }, "422": { "$ref": "#/components/responses/422" } }
      }
    },

    "/tenants/{id}": {
      "get": {
        "tags": ["Tenants"], "summary": "Tenant detail with active lease, payment summary, and outstanding balance",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Tenant detail" }, "404": { "$ref": "#/components/responses/404" } }
      },
      "put": {
        "tags": ["Tenants"], "summary": "Full update of a tenant",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": { "required": true, "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Tenant" } } } },
        "responses": { "200": { "description": "Updated" } }
      },
      "patch": {
        "tags": ["Tenants"], "summary": "Partial update of a tenant",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": { "required": true, "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Tenant" } } } },
        "responses": { "200": { "description": "Updated" } }
      }
    },

    "/tenants/{id}/statement": {
      "get": {
        "tags": ["Tenants"], "summary": "Payment and invoice statement for a date range",
        "parameters": [
          { "$ref": "#/components/parameters/id" },
          { "name": "date_from", "in": "query", "required": true, "schema": { "type": "string", "format": "date" } },

      "patch": {
        "tags": ["Users"], "summary": "Change user status — admin only (cannot change own)",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": {
            "type": "object", "required": ["status"],
            "properties": { "status": { "type": "string", "enum": ["active","inactive","suspended"] } }
          }}}
        },
        "responses": { "200": { "description": "Status updated" }, "403": { "description": "Cannot modify own status" } }
      }
    },

    "/users/{id}/tokens": {
      "get": {
        "tags": ["Users"], "summary": "List all API tokens for a user — admin only",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Token list" } }
      }
    },

    "/tokens": {
      "get": {
        "tags": ["Users"], "summary": "List all tokens across all users — admin only",
        "parameters": [
          { "$ref": "#/components/parameters/page" },
          { "name": "per_page", "in": "query", "schema": { "type": "integer", "default": 50 } }
        ],
        "responses": { "200": { "description": "Paginated token list with user info" } }
      }
    },

    "/tokens/{id}": {
      "delete": {
        "tags": ["Users"], "summary": "Revoke any token by ID — admin only",
        "parameters": [{ "$ref": "#/components/parameters/id" }],
        "responses": { "200": { "description": "Token revoked" } }
      }
    }

  }
};

window.onload = () => {
  SwaggerUIBundle({
    spec,
    dom_id: '#swagger-ui',
    deepLinking: true,
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: 'BaseLayout',
    persistAuthorization: true,
    displayRequestDuration: true,
    filter: true,
    tryItOutEnabled: true
  });
};
</script>
</body>
